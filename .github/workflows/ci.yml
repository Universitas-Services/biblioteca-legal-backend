name: CI/CD Pipeline - Biblioteca Legal

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main', 'dev']

jobs:
  # ----------------------------------------
  # FASE 1: INTEGRACIÓN CONTINUA (CI)
  # ----------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Linter
        run: npm run lint

      - name: Ejecutar Pruebas
        run: npm run test

      - name: Construir la aplicación
        run: npm run build

  # ----------------------------------------
  # FASE 2: DESPLIEGUE CONTINUO (CD)
  # ----------------------------------------
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    # Modificación: Se ejecuta en push a main O en pull request cuyo destino sea main
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - name: Disparar Deploy Hook de Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          echo "Se ha notificado a Render para que comience el despliegue."
